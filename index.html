<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض منظومة Bus App - وزارة النقل</title>
    <meta name="description"
        content="عرض تقديمي لمشروع منظومة Bus App لأتمتة مراكز انطلاق البولمان - وزارة النقل السورية">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Particle Background -->
    <canvas id="particleCanvas"></canvas>

    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- Logo -->
    <div class="logo-container">
        <div class="logo-text">BUS APP</div>
    </div>

    <!-- Fullscreen Button -->
    <div class="fullscreen-btn" id="fullscreenBtn" title="شاشة كاملة (F)">
        <i class="fas fa-expand"></i>
    </div>

    <!-- Slide Counter -->
    <div class="slide-counter" id="slideCounter">1 / 16</div>

    <!-- Speaker Notes Toggle -->
    <div class="speaker-notes-toggle" id="notesToggle" title="إظهار ملاحظات المتحدث (N)">
        <i class="fas fa-comment-dots"></i>
    </div>

    <!-- Speaker Notes Panel -->
    <div class="speaker-notes-panel" id="notesPanel">
        <div class="speaker-notes-content" id="notesContent"></div>
    </div>

    <!-- Impact Modal Overlay -->
    <div class="impact-overlay" id="impactOverlay">
        <div class="impact-card">
            <div class="close-impact" id="closeImpact">
                <i class="fas fa-times"></i>
            </div>
            <div class="impact-header">
                <h3 id="impactTitle">اسم الجهة</h3>
            </div>
            <div class="impact-grid">
                <div class="impact-column pain">
                    <h4><i class="fas fa-exclamation-triangle"></i> المعاناة الحالية</h4>
                    <ul id="impactPain"></ul>
                </div>
                <div class="impact-column causes">
                    <h4><i class="fas fa-random"></i> أثر العشوائية</h4>
                    <ul id="impactCauses"></ul>
                </div>
                <div class="impact-column solutions">
                    <h4><i class="fas fa-check-circle"></i> الحل الرقمي</h4>
                    <ul id="impactSolutions"></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="presentation-container">
        <div class="background-overlay"></div>
        <img src="hero.png" class="hero-bg" alt="Futuristic Transport">

        <!-- ═══════════════════════════════════════════════════════
             الشرائح تُولَّد ديناميكياً من content.js عبر script.js
             للتعديل على المحتوى: افتح content.js فقط
             ═══════════════════════════════════════════════════════ -->
        <div id="slidesContainer"></div>

        <!-- Navigation Controls -->
        <div class="nav-controls">
            <button class="nav-btn" id="prevBtn" title="السابق (سهم يمين)">
                <i class="fas fa-chevron-right" style="margin-left: 5px;"></i> السابق
            </button>
            <button class="nav-btn" id="nextBtn" title="التالي (سهم يسار)">
                التالي <i class="fas fa-chevron-left" style="margin-right: 5px;"></i>
            </button>
        </div>
    </div>

    <script src="content.js"></script>
    <script src="script.js"></script>
</body>

</html>
